<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - DASHBOARD SRE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NEXUS SRE <span class="blink">_</span></h1>
            <div id="status-badge" class="badge">SINCRO ATIVA</div>
        </header>

        <main class="grid">
            <div class="card">
                <div class="card-header">NÓ DE PRODUÇÃO (RENDER)</div>
                <div class="value" id="status-text">--</div>
            </div>

            <div class="card">
                <div class="card-header">NÓ MÓVEL (TERMUX)</div>
                <div class="value" id="batt-percent">--%</div>
            </div>

            <!-- NOVO MÓDULO: EXECUTOR DE ARSENAL -->
            <div class="card arsenal" style="border-color: #0088ff;">
                <div class="card-header" style="color: #0088ff;">COMANDO DE ARSENAL</div>
                <input type="text" id="script-input" placeholder="Ex: bateria.sh" style="width: 100%; padding: 10px; background: #000; border: 1px solid #0088ff; color: #0088ff; margin-top: 10px; box-sizing: border-box;">
                <button id="run-script" style="width: 100%; margin-top: 10px; padding: 10px; background: #0088ff; color: #fff; font-weight: bold; cursor: pointer; border: none;">EXECUTAR NO TERMUX</button>
            </div>

            <div class="card">
                <div class="card-header">LANTERNA REMOTA</div>
                <div style="display: flex; gap: 10px;">
                    <button id="torch-on" style="flex: 1; padding: 10px; background: #ffcc00; border: none;">LIGAR</button>
                    <button id="torch-off" style="flex: 1; padding: 10px; background: #333; color: #fff; border: none;">DESLIGAR</button>
                </div>
            </div>
        </main>

        <div id="console" class="log-area"></div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
