<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - DASHBOARD SRE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NEXUS SRE <span class="blink">_</span></h1>
            <div id="global-status" class="badge">SISTEMA ATIVO</div>
        </header>

        <main class="grid">
            <!-- NÓ CLOUD: RENDER -->
            <div class="card cloud">
                <div class="card-header">NÓ DE PRODUÇÃO (RENDER)</div>
                <div class="value" id="status-text">--</div>
                <p>Uptime: <span id="uptime-text">--</span></p>
            </div>

            <!-- NÓ MOBILE: TERMUX -->
            <div class="card mobile">
                <div class="card-header">NÓ MÓVEL (TERMUX)</div>
                <div class="battery-section">
                    <span id="batt-icon" style="font-size: 3rem;">🔋</span>
                    <div class="value" id="batt-percent">--%</div>
                </div>
                <p id="batt-status">Sincronizando...</p>
            </div>

            <!-- NOVO MÓDULO: COMANDO DE VOZ -->
            <div class="card voice">
                <div class="card-header">TRANSMISSÃO DE VOZ (TTS)</div>
                <input type="text" id="voice-input" placeholder="Digite a mensagem para o Termux..." style="width: 100%; padding: 10px; background: #000; border: 1px solid var(--primary); color: var(--primary); margin-top: 10px;">
                <button id="send-voice" style="width: 100%; margin-top: 10px; padding: 10px; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; border: none;">TRANSMITIR VOZ</button>
            </div>
        </main>

        <section class="console-wrapper">
            <div id="console" class="log-area"></div>
        </section>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
