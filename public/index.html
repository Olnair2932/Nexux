<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - DASHBOARD SRE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NEXUS SRE <span class="blink">_</span></h1>
            <div id="status-badge" class="badge">SINCRO ATIVA</div>
        </header>

        <main class="grid">
            <!-- CLOUD -->
            <div class="card">
                <div class="card-header">NÓ DE PRODUÇÃO (RENDER)</div>
                <div class="value" id="status-text">CONECTANDO...</div>
                <p>Uptime: <span id="uptime-text">--</span></p>
            </div>

            <!-- MOBILE -->
            <div class="card">
                <div class="card-header">NÓ MÓVEL (TERMUX)</div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span id="batt-icon" style="font-size: 3rem;">🔋</span>
                    <div class="value" id="batt-percent">--%</div>
                </div>
            </div>

            <!-- HARDWARE -->
            <div class="card">
                <div class="card-header">CONTROLE DE HARDWARE</div>
                <p>Lanterna Remota:</p>
                <div style="display: flex; gap: 10px;">
                    <button id="torch-on" style="flex: 1; padding: 15px; background: #ffcc00; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">LIGAR</button>
                    <button id="torch-off" style="flex: 1; padding: 15px; background: #333; color: #fff; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">DESLIGAR</button>
                </div>
            </div>

            <!-- VOZ -->
            <div class="card">
                <div class="card-header">TRANSMISSÃO DE VOZ</div>
                <input type="text" id="voice-input" placeholder="Mensagem..." style="width: 100%; padding: 10px; background: #000; border: 1px solid #00ff41; color: #00ff41; margin-top: 10px; box-sizing: border-box;">
                <button id="send-voice" style="width: 100%; margin-top: 10px; padding: 10px; background: #00ff41; color: #000; font-weight: bold; cursor: pointer; border: none;">TRANSMITIR</button>
            </div>
        </main>

        <div id="console" class="log-area"></div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
