<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - SRE DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>NEXUS <span class="blink">_</span></h1>
                <p>SENTINELA MONITORING SYSTEM v3.5</p>
            </div>
            <div id="status-badge" class="badge">CONECTANDO AO NODE...</div>
        </header>

        <main class="grid">
            <div class="card">
                <h3>SERVER STATUS</h3>
                <div class="value" id="status-text">WAITING</div>
            </div>
            <div class="card">
                <h3>UPTIME</h3>
                <div class="value" id="uptime-text">0s</div>
            </div>
            <div class="card">
                <h3>SYSTEM LOAD</h3>
                <div class="value" id="load-text">0.00</div>
                <div class="bar-container">
                    <div id="load-bar" class="fill" style="width: 0%"></div>
                </div>
            </div>
        </main>

        <section class="console-wrapper">
            <div class="console-header">LIVE TELEMETRY LOGS</div>
            <div id="console" class="log-area">
                [SYSTEM] Iniciando interceptação de pacotes de dados...
            </div>
        </section>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module" src="script.js"></script>
</body>
</html>
